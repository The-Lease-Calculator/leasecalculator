[[plugins]]
package = "@netlify/plugin-nextjs"

[build]
command = "npm run build"
publish = ".next"

[build.environment]
NODE_VERSION = "20"

[functions]
included_files = ["node_modules/@anthropic-ai/sdk/**"]

# Custom domain
[[redirects]]
from = "https://www.leasecalculator.com/*"
to = "https://leasecalculator.com/:splat"
status = 301
force = true
